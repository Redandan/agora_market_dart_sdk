name: Sync SDK from API

on:
  repository_dispatch:
    types: [api-changed]
  workflow_dispatch:
  schedule:
    - cron: '17 0 * * 1'  # Monday 00:17 UTC = Monday 08:17 Asia/Taipei (weekly safety net)

concurrency:
  group: sync-sdk
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download upstream swagger
        run: curl -sfL https://agoramarketapi.purrtechllc.com/api/v3/api-docs -o /tmp/swagger-raw.json

      - name: Compute normalized hash
        id: hash
        run: |
          NEW_HASH=$(node ci/normalize_hash.js /tmp/swagger-raw.json)
          OLD_HASH=$(tr -d '[:space:]' < .swagger-hash 2>/dev/null || echo "none")
          echo "new=$NEW_HASH" >> "$GITHUB_OUTPUT"
          echo "old=$OLD_HASH" >> "$GITHUB_OUTPUT"
          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip note
        if: steps.hash.outputs.changed == 'false'
        run: echo "::notice::swagger unchanged (hash ${{ steps.hash.outputs.new }}); nothing to regen"

      - name: Setup Java 17
        if: steps.hash.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (stable)
        if: steps.hash.outputs.changed == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Regenerate SDK
        if: steps.hash.outputs.changed == 'true'
        run: bash generate_api.sh

      - name: Update .swagger-hash
        if: steps.hash.outputs.changed == 'true'
        run: echo "${{ steps.hash.outputs.new }}" > .swagger-hash

      - name: Open PR
        if: steps.hash.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/sync-sdk
          delete-branch: true
          title: 'chore: regen SDK from upstream swagger'
          commit-message: |
            chore: regen SDK from upstream swagger

            hash:    ${{ steps.hash.outputs.new }}
            trigger: ${{ github.event_name }}
            api-sha: ${{ github.event.client_payload.sha }}
          body: |
            Auto-generated by `.github/workflows/sync-sdk.yml`.

            | field | value |
            |---|---|
            | trigger | `${{ github.event_name }}` |
            | API commit | `${{ github.event.client_payload.sha }}` |
            | API actor | `${{ github.event.client_payload.actor }}` |
            | old hash | `${{ steps.hash.outputs.old }}` |
            | new hash | `${{ steps.hash.outputs.new }}` |

            **Review carefully** — model field changes can break downstream Flutter apps at runtime.
          labels: |
            auto-sync
            sdk-regen

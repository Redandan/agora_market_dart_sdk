      "SopMtfAdxConfig": {
        "type": "object",
        "description": "SOP_MTF_ADX 策略參數配置",
        "properties": {
          "enableMtf": {
            "type": "boolean",
            "description": "是否啟用多時框過濾（1D 趨勢 + MTF K 線）",
            "example": true
          },
          "minSignals": {
            "type": "integer",
            "format": "int32",
            "description": "1H 打分訊號最低門檻（A/C/D/E 共 4 項中至少需達到幾項；Signal B 已升級為必要前提條件）",
            "example": 3,
            "maximum": 4,
            "minimum": 1
          },
          "adxEntryThreshold": {
            "type": "number",
            "format": "double",
            "description": "ADX 進場強度門檻，低於此值不進場",
            "example": 25.0,
            "minimum": 0
          },
          "maxDistanceFromEma": {
            "type": "number",
            "format": "double",
            "description": "價格與 EMA20 最大距離百分比（超過不進場）",
            "example": 0.015,
            "maximum": 1.0,
            "minimum": 0.0
          },
          "fixedStopLossPct": {
            "type": "number",
            "format": "double",
            "description": "固定止損百分比",
            "example": 0.012,
            "maximum": 1.0,
            "minimum": 0.0
          },
          "fixedTakeProfitPct": {
            "type": "number",
            "format": "double",
            "description": "固定止盈百分比",
            "example": 0.03,
            "maximum": 1.0,
            "minimum": 0.0
          },
          "maxHoldingHours": {
            "type": "integer",
            "format": "int32",
            "description": "最大持倉小時數（0 表示不限制）",
            "example": 24,
            "minimum": 0
          },
          "moveSlToBreakeven": {
            "type": "boolean",
            "description": "TP1 觸發後止損移至成本價",
            "example": true
          },
          "rsiPullbackThreshold": {
            "type": "number",
            "format": "double",
            "description": "RSI 回調門檻，低於此值進入 PULLBACK 狀態",
            "example": 40.0,
            "maximum": 100.0,
            "minimum": 0.0
          },
          "rsiReboundConfirm": {
            "type": "number",
            "format": "double",
            "description": "RSI Rebound 確認門檻，RSI 由 pullback 回升超過此值才視為 REBOUND_READY 成立",
            "example": 50.0,
            "maximum": 100.0,
            "minimum": 0.0
          },
          "requireCandleBreak": {
            "type": "boolean",
            "description": "是否要求價格突破前一根 K 線高點才允許進場（ENTRY_TRIGGER 動能確認）",
            "example": true
          },
          "minRsiDelta": {
            "type": "number",
            "format": "double",
            "description": "RSI Rebound 最小上升幅度，防止 V 型假反彈（rsiNow - rsiPrev >= minRsiDelta）",
            "example": 3.0,
            "minimum": 0.0
          },
          "reboundLookbackBars": {
            "type": "integer",
            "format": "int32",
            "description": "Pullback→Rebound 狀態機的最大回溯 K 線數，超過此範圍找不到序列則不進場",
            "example": 10,
            "minimum": 1
          },
          "minRR": {
            "type": "number",
            "format": "double",
            "description": "最小風險報酬比（reward / risk）",
            "example": 2.0,
            "minimum": 0
          },
          "keyLevelLookbackBars": {
            "type": "integer",
            "format": "int32",
            "description": "關鍵位計算的回望 K 線數",
            "example": 20,
            "minimum": 5
          },
          "dailyMaPeriod": {
            "type": "integer",
            "format": "int32",
            "description": "日線趨勢判斷的 MA 週期",
            "example": 50,
            "minimum": 20
          },
          "rsiSellThreshold": {
            "type": "number",
            "format": "double",
            "description": "RSI 做空門檻，高於此值視為空頭回調訊號成立",
            "example": 60.0,
            "maximum": 100.0,
            "minimum": 0.0
          },
          "allowShort": {
            "type": "boolean",
            "description": "是否允許做空（借貨高賣低買還）",
            "example": false
          },
          "shortOnly": {
            "type": "boolean",
            "description": "純空頭模式：只執行空頭訊號，完全跳過多頭進場邏輯（自動啟用 allowShort）",
            "example": false
          },
          "dailyBorrowingRate": {
            "type": "number",
            "format": "double",
            "description": "借貨日利率（參考幣安方式，每小時扣 dailyBorrowingRate÷24，最少計 1 小時，僅 allowShort=true 時有效）",
            "example": 0.00030,
            "maximum": 1.0,
            "minimum": 0.0
          },
          "atrTrailingStopEnabled": {
            "type": "boolean",
            "description": "是否啟用 ATR 追蹤止損（替代固定止損追隨價格移動）",
            "example": false
          },
          "atrPeriod": {
            "type": "integer",
            "format": "int32",
            "description": "ATR 追蹤止損的 ATR 週期，僅 atrTrailingStopEnabled=true 時有效",
            "example": 14,
            "minimum": 1
          },
          "atrMultiplier": {
            "type": "number",
            "format": "double",
            "description": "ATR 追蹤止損的 ATR 倍數，僅 atrTrailingStopEnabled=true 時有效",
            "example": 2.0,
            "minimum": 0
          },
          "requiredDailyTrend": {
            "type": "string",
            "description": "要求的日線趨勢方向（BULLISH/BEARISH/ANY）。不符合時策略靜默跳過實盤評估，不影響回測。",
            "enum": [
              "BULLISH",
              "BEARISH",
              "ANY"
            ],
            "example": "BEARISH"
          },
          "atrSlMultiplier": {
            "type": "number",
            "format": "double",
            "description": "ATR 動態初始止損倍數（SL = ATR% × multiplier，優先於 fixedStopLossPct）",
            "example": 2.5
          },
          "atrTpMultiplier": {
            "type": "number",
            "format": "double",
            "description": "ATR 動態初始止盈倍數（TP = ATR% × multiplier，優先於 fixedTakeProfitPct）",
            "example": 7.0
          },
          "diagnostics": {
            "type": "object",
            "additionalProperties": {
              "type": "boolean"
            },
            "description": "診斷碼開關設定（false 表示停用該診斷碼，預設全部啟用，null 表示全部啟用）",
            "example": {
              "ADX_BELOW_THRESHOLD": false,
              "LONG_SIGNALS_NOT_ENOUGH": false
            }
          },
          "yearLookbackBars": {
            "type": "integer",
            "format": "int32",
            "description": "[SCORE_BUY] 回看年高的 K 線數（1d 用 252，1h 用 8760）",
            "example": 252,
            "minimum": 1
          },
          "medLookbackBars": {
            "type": "integer",
            "format": "int32",
            "description": "[SCORE_BUY] 中期相對低點回看 K 線數（1d 用 63，1h 用 504）",
            "example": 63,
            "minimum": 1
          },
          "shortLookbackBars": {
            "type": "integer",
            "format": "int32",
            "description": "[SCORE_BUY] 短期相對低點回看 K 線數（1d 用 10，1h 用 48）",
            "example": 10,
            "minimum": 1
          },
          "rsiOversold": {
            "type": "number",
            "format": "double",
            "description": "[SCORE_BUY] RSI 超賣門檻，低於此值視為超賣",
            "example": 40.0,
            "maximum": 100.0,
            "minimum": 0.0
          },
          "rsiOverbought": {
            "type": "number",
            "format": "double",
            "description": "[SCORE_BUY] RSI 超漲門檻，高於此值觸發賣出訊號",
            "example": 70.0,
            "maximum": 100.0,
            "minimum": 0.0
          },
          "buyThreshold": {
            "type": "number",
            "format": "double",
            "description": "[SCORE_BUY] nnOutput 買入門檻（sigmoid 輸出）",
            "example": 0.8,
            "maximum": 1.0,
            "minimum": 0.0
          },
          "volumeBreakoutMultiplier": {
            "type": "number",
            "format": "double",
            "description": "[SCORE_BUY] 量能放大倍數門檻",
            "example": 1.5,
            "minimum": 0.0
          },
          "scoreScale": {
            "type": "number",
            "format": "double",
            "description": "[SCORE_BUY] sigmoid 輸入縮放係數（score × scoreScale - scoreShift）",
            "example": 8.0
          },
          "scoreShift": {
            "type": "number",
            "format": "double",
            "description": "[SCORE_BUY] sigmoid 輸入平移量（score × scoreScale - scoreShift）",
            "example": 4.0
          },
          "diagScoreFloor": {
            "type": "number",
            "format": "double",
            "description": "[SCORE_BUY] 記錄診斷 log 的 score 最低門檻（低於此值不記錄）",
            "example": 0.4,
            "minimum": 0.0
          }
        }
      },

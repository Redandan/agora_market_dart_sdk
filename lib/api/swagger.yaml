  "components": {
    "schemas": {
      "BatchUpdatePaytableRequest": {
        "type": "object",
        "description": "批次更新賠付規則請求",
        "properties": {
          "gameType": {
            "type": "string",
            "description": "遊戲類型",
            "enum": [
              "SLOT_MACHINE",
              "DICE",
              "DARTS",
              "BASKETBALL",
              "FOOTBALL",
              "BOWLING"
            ],
            "example": "SLOT_MACHINE"
          },
          "handicapType": {
            "type": "string",
            "description": "盤口類型",
            "enum": [
              "STANDARD",
              "HIGH_ROLLER",
              "PROMOTIONAL",
              "VIP"
            ],
            "example": "STANDARD"
          },
          "entries": {
            "type": "array",
            "description": "賠付規則列表",
            "items": {
              "$ref": "#/components/schemas/PaytableEntryRequest"
            },
            "minItems": 1
          }
        },
        "required": [
          "entries",
          "gameType",
          "handicapType"
        ]
      },
      "PaytableEntryRequest": {
        "type": "object",
        "properties": {
          "diceValue": {
            "type": "integer",
            "format": "int32",
            "description": "骰子值 (1-64)",
            "example": 64,
            "maximum": 64,
            "minimum": 1
          },
          "multiplier": {
            "type": "number",
            "description": "賠率倍數",
            "example": 10.0,
            "minimum": 0.0
          },
          "description": {
            "type": "string",
            "description": "描述",
            "example": "最高獎 10倍"
          },
          "status": {
            "type": "integer",
            "format": "int32",
            "default": "1",
            "description": "狀態 (0=停用, 1=啟用)",
            "example": 1
          }
        },
        "required": [
          "diceValue",
          "multiplier"
        ]
      },
      "PaytableDTO": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "format": "int64"
          },
          "gameType": {
            "type": "string",
            "enum": [
              "SLOT_MACHINE",
              "DICE",
              "DARTS",
              "BASKETBALL",
              "FOOTBALL",
              "BOWLING"
            ]
          },
          "handicapType": {
            "type": "string",
            "enum": [
              "STANDARD",
              "HIGH_ROLLER",
              "PROMOTIONAL",
              "VIP"
            ]
          },
          "diceValue": {
            "type": "integer",
            "format": "int32"
          },
          "multiplier": {
            "type": "number"
          },
          "description": {
            "type": "string"
          },
          "status": {
            "type": "integer",
            "format": "int32"
          },
          "probability": {
            "type": "number"
          },
          "rtpContribution": {
            "type": "number"
          }
        }
      },
      "PaytableWithRtpDTO": {
        "type": "object",
        "properties": {
          "gameType": {
            "type": "string",
            "enum": [
              "SLOT_MACHINE",
              "DICE",
              "DARTS",
              "BASKETBALL",
              "FOOTBALL",
              "BOWLING"
            ]
          },
          "handicapType": {
            "type": "string",
            "enum": [
              "STANDARD",
              "HIGH_ROLLER",
              "PROMOTIONAL",
              "VIP"
            ]
          },
          "paytables": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/PaytableDTO"
            }
          },
          "totalRtp": {
            "type": "number"
          },
          "expectedProfit": {
            "type": "number"
          }
        }
      },
      "UpdateActivityRequest": {
        "type": "object",
        "description": "更新活動請求",
        "properties": {
          "name": {
            "type": "string",
            "description": "活動名稱",
            "example": "週末拉霸活動"
          },
          "groupId": {
            "type": "integer",
            "format": "int64",
            "description": "Telegram 群組 ID（可選，未填則維持原值）",
            "example": -100123456
          },
          "startTime": {
            "type": "string",
            "format": "date-time",
            "description": "開始時間",
            "example": "2026-02-16T20:00:00"
          },
          "endTime": {
            "type": "string",
            "format": "date-time",
            "description": "結束時間",
            "example": "2026-02-16T23:59:59"
          },
          "betAmount": {
            "type": "number",
            "description": "下注金額",
            "example": 150.0,
            "minimum": 0.0
          },
          "status": {
            "type": "string",
            "description": "活動狀態",
            "enum": [
              "PENDING",
              "RUNNING",
              "FINISHED"
            ],
            "example": "RUNNING"
          },
          "gameType": {
            "type": "string",
            "description": "遊戲類型",
            "enum": [
              "SLOT_MACHINE",
              "DICE",
              "DARTS",
              "BASKETBALL",
              "FOOTBALL",
              "BOWLING"
            ],
            "example": "SLOT_MACHINE"
          },
          "handicapType": {
            "type": "string",
            "description": "盤口類型",
            "enum": [
              "STANDARD",
              "HIGH_ROLLER",
              "PROMOTIONAL",
              "VIP"
            ],
            "example": "STANDARD"
          }
        }
      },
      "ActivityDTO": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "format": "int64"
          },
          "name": {
            "type": "string"
          },
          "groupId": {
            "type": "integer",
            "format": "int64"
          },
          "betAmount": {
            "type": "number"
          },
          "startTime": {
            "type": "string",
            "format": "date-time"
          },
          "endTime": {
            "type": "string",
            "format": "date-time"
          },
          "status": {
            "type": "string"
          }
        }
      },
      "StorefrontHomeDraftRequest": {
        "type": "object",
        "description": "Seller storefront home draft update",
        "properties": {
          "html": {
            "type": "string",
            "description": "Single HTML document for the seller storefront home draft",
            "maxLength": 500000,
            "minLength": 0
          }

    "/pickup-stores/search": {
      "post": {
        "tags": [
          "pickup-stores"
        ],
        "summary": "查詢取貨商店門市",
        "description": "統一的取貨商店門市查詢接口，支持多種查詢條件和任意組合：1. 根據門市代號精確查詢（storeCode，與其他條件互斥）2. 根據商店類型查詢（storeType：SEVEN_ELEVEN、FAMILY_MART、HILIFE、OK_MART）3. 組合查詢支持（可任意組合以下條件）：   - 商店類型（storeType，建議必填）   - 縣市（city，可選）   - 區域（district，可選，需配合 city 使用）   - 關鍵字（keyword，可選，同時搜尋門市名稱或地址，支持地址模糊查詢）4. 組合查詢範例：   - storeType + city：查詢指定縣市的所有門市   - storeType + city + keyword：在指定縣市內搜尋包含關鍵字的門市   - storeType + city + district + keyword：在指定區域內搜尋包含關鍵字的門市5. 分頁支援（設置 page 和 size，查詢結果超過1000筆時自動啟用分頁）",
        "operationId": "searchStores",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/PickupStoreSearchParam"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/PagePickupStore"
                }
              }
            }
          }
        }
      }
    },
    "/pickup-stores/check-sync": {
      "post": {
        "tags": [
          "pickup-stores"
        ],
        "summary": "檢查取貨商店門市資料是否需要更新",
        "description": "比較數據庫中的取貨商店門市資料與源網站的資料，返回差異信息。包括：新增門市數量、需要更新的門市數量、已關閉的門市數量等。city 參數為可選，如果指定則僅檢查該縣市，否則檢查所有縣市（僅統計總數）。",
        "operationId": "checkSyncStatus",
        "parameters": [
          {
            "name": "storeType",

    "/market/klines": {
      "get": {
        "tags": [
          "Market Chart"
        ],
        "summary": "查詢 K 線圖表資料",
        "description": "依 symbol + intervalCode 查詢本地 DB 已儲存的 K 線。 若同時提供 startTime 與 endTime 則以時間範圍為準；否則取最近 limit 根（預設 500，最大 1500）。 所有時間欄位均為 UTC。",
        "operationId": "getKlines",
        "parameters": [
          {
            "name": "symbol",
            "in": "query",
            "description": "交易對（自動轉大寫），例如 BTCUSDT",
            "required": true,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "intervalCode",
            "in": "query",
            "description": "K 線週期，例如 1m / 5m / 15m / 1h / 4h / 1d",
            "required": true,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "startTime",
            "in": "query",
            "description": "開始時間 (UTC, ISO-8601)，須與 endTime 同時提供",
            "required": false,
            "schema": {
              "type": "string",
              "format": "date-time"
            }
          },
          {
            "name": "endTime",
            "in": "query",
            "description": "結束時間 (UTC, ISO-8601)，須與 startTime 同時提供",
            "required": false,
            "schema": {
              "type": "string",
              "format": "date-time"
            }
          },
          {
            "name": "limit",
            "in": "query",
            "description": "最近 N 根（僅在未提供 startTime/endTime 時有效），範圍 1–1500，預設 500",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "成功",
            "content": {
              "*/*": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/KlineBarDTO"
                  }
                }
              }
            }
          },
          "400": {
            "description": "參數錯誤（endTime 須晚於 startTime，或缺少必填參數）",
            "content": {
              "*/*": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/KlineBarDTO"
                  }
                }
              }
            }
          }
        }
      }
    },

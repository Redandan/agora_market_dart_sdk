                "HILIFE",
                "OK_MART",
                "PLATFORM_DELIVERY"
              ]
            }
          },
          {
            "name": "city",
            "in": "query",
            "description": "縣市名稱（可選），例如：台北市。如果未指定，則檢查所有縣市",
            "required": false,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/PickupStoreSyncCheckResponse"
                }
              }
            }
          }
        }
      }
    },

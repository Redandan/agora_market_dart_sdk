            "type": "string",
            "description": "驗證碼，6位數字。\n\n**使用場景：**\n- **平台配送（PLATFORM_DELIVERY）**：必須提供，由配送員確認送達後系統發送的6位驗證碼\n- **第三方物流（非平台配送）**：可選，不需要提供驗證碼\n\n**獲取方式：** 平台配送時，系統會通過推送通知或消息發送驗證碼給買家",

    "/orders/confirm": {
      "post": {
        "tags": [
          "member-orders"
        ],
        "summary": "確認收貨",
        "description": "買家確認收貨，完成訂單。\n\n**使用場景說明：**\n\n1. **平台配送（PLATFORM_DELIVERY）**：\n   - 訂單狀態必須為 `DELIVERED`（已送達）\n   - 必須提供驗證碼（`verifyCode`），由配送員確認送達後系統發送給買家\n   - 驗證碼為6位數字\n   - 請求示例：`{\"orderId\": \"ORD001\", \"verifyCode\": \"123456\", \"remark\": \"已收到\"}`\n\n2. **第三方物流（非平台配送）**：\n   - 訂單狀態可以是 `SHIPPED`（已發貨）或 `DELIVERED`（已送達）\n   - 不需要提供驗證碼（`verifyCode` 可為空或null）\n   - 特別適用於缺少物流單號（trackingNumber）的情況，買家可手動確認收貨\n   - 請求示例：`{\"orderId\": \"ORD002\", \"verifyCode\": null, \"remark\": \"已收到\"}`\n\n**確認收貨後：**\n- 訂單狀態更新為 `COMPLETED`（已完成）\n- 款項自動轉入賣家帳戶\n- 系統發送完成通知給買家和賣家\n- 買家可以開始進行商品評價",
        "operationId": "confirmOrder",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/OrderConfirmParam"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "確認收貨成功，訂單已完成"
          },
          "400": {
            "description": "業務錯誤或參數驗證失敗。可能的錯誤原因：\n- 訂單不存在\n- 訂單ID不能為空（參數驗證失敗）\n- 只能確認已發貨或已配送的訂單（訂單狀態不符合要求）\n- 只能確認已配送的訂單（平台配送時，訂單必須為DELIVERED狀態）\n- 請輸入驗證碼（平台配送時，必須提供驗證碼）\n- 驗證碼不正確（平台配送時，驗證碼錯誤）",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          },
          "401": {
            "description": "未授權，需要登入"
          },
          "403": {
            "description": "無權限，只有訂單的買家可以確認收貨"
          },
          "500": {
            "description": "服務器內部錯誤"
          }
        }
      }
    },
